<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .box {
        width: 100px;
        height: 100px;
        position: absolute;
      }

      /* 
        nth-child : 가상 클래스 선택자
        - 특정 순서의 자식 요소를 선택
        */

      .box:nth-child(1) {
        background-color: red;
        left: 10px;
        top: 10px;
      }

      .box:nth-child(2) {
        background-color: green;
        left: 40px;
        top: 40px;
      }

      .box:nth-child(3) {
        background-color: blue;
        left: 70px;
        top: 70px;
      }
    </style>
  </head>
  <!-- 
  absolute의 경우
  부모 요소들 중에 position 이 지정이 되어있을 경우 해당 부모를 기준으로 
  top, right, botton, left 속성을 사용해 위치를 지정
  -->
  <body>
    <h1>Lorem ipsum dolor sit amet.</h1>
    <div class="parent">
      <div class="box" style="z-index: 3"></div>
      <div class="box" style="z-index: 2"></div>
      <div class="box" style="z-index: 1"></div>
    </div>
    <h1>Lorem ipsum dolor sit amet.</h1>
  </body>
</html>
