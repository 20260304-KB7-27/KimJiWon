<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <!-- 
    <form> 태그 : 사용자로부터 입력을 받기 위한 양식을 만드는 태그
    action : 폼데이터를 전송할 서버의 URL
    method : 데이터 전송 방식 (GET/POST)
    -->
    <form method="get" action="https://www.naver.com">
      <table>
        <tr>
          <td><label for="username">이름</label></td>
          <!-- 
          <input> 태그
          name : 서버로 전송될 때 사용되는 이름
          id : html 요소의 고유식별자
          type : 입력 필드의 종류
          -->
          <td><input id="username" name="username" type="text" /></td>
        </tr>

        <tr>
          <td>성별</td>
          <td>
            <!-- 
            name 정의하지 않은 경우 남/여 모두 선택 가능 -> 정의 후 하나만 선택 가능
            -->
            <input id="man" name="gender" value="m" type="radio" />
            <label for="man">남자</label>
            <input id="woman" name="gender" value="w" type="radio" />
            <label for="woman">여자</label>
          </td>
        </tr>
      </table>
      <input type="submit" value="가입" />
    </form>
  </body>
</html>
