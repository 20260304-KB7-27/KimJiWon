<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      /* 전체 선택자 */
      * {
        color: black;
      }
      /* 태그 선택자 */
      h1 {
        color: blue;
      }
      /*
      클래스 선택자
      - 여러 클래스를 한 번에 적용 가능
      */
      .select {
        color: red;
      }
      /* id 선택자 */
      #banana {
        color: yellow;
      }
      #bana {
        background-color: olive;
      }
      .item {
        background-color: blueviolet;
      }
    </style>
  </head>
  <body>
    <!-- 
    전체 선택자 * : 모든 요소를 선택
    -->
    <h1>제목 글자</h1>
    <p>
      Lorem ipsum dolor sit amet, consectetur adipisicing elit. Incidunt
      sapiente dolore, pariatur unde odio dolores dolorum numquam maxime
      laboriosam possimus iure ad! Inventore, corporis rem. Sint tempore minima
      voluptates debitis.
    </p>

    <!-- ul>li.select*4 -->
    <ul>
      <li class="select">사과</li>
      <li id="banana" class="item">바나나</li>
      <li class="select">오렌지</li>
      <li>감</li>
    </ul>
  </body>
</html>
