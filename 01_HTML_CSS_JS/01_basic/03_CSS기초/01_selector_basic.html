<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      h1 {
        background-color: rgb(191, 157, 226);
        color: red !important;
      }
    </style>
  </head>
  <!-- 
CSS
- HTML 문서의 스타일을 정의하는 스타일 시트 언어
- cascading, 상속, 재사용성

사용방법
1. 외부 스타일 시트 (.css)
- 별도의 .css 파일을 생성해 HTML 문서와 연결
2. 내부 스타일 시트
- HTML 문서 내 head 태그 안에 style 태그를 사용해 css 정의
3. 인라인 스타일
- HTML 요소의 style 속성에 직접 스타일 적용

선택자
- css에서 스타일을 적용할 HTML 요소를 선택하는 방법
- 종류 : 테그 / ID / Class / 전체(*) / 속성

우선순위
1. !important
2. 인라인 스타일
3. 아이디 선택자
4. 클래스 선택자
5. 태그 선택자
6. 전체 선택자
7. 상속된 스타일

-->
  <body>
    <h1 style="color: orange">CSS3 선택자 기본</h1>
  </body>
</html>
