<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      let date = new Date();
      let season;
      let month = date.getMonth() + 1;

      if (month >= 3 && month <= 5) {
        season = '봄';
      } else if (month >= 6 && month <= 8) {
        season = '여름';
      } else if (month >= 9 && month <= 11) {
        season = '가을';
      } else {
        season = '겨울';
      }

      alert(season + '입니다.');
    </script>
  </head>

  <body></body>
</html>
