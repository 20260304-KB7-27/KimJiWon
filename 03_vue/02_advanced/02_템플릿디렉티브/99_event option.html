<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue 3 연습용 Options API</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  </head>
  <body>
    <div id="app"></div>
    <button v-on:click="increaseCount()">클릭하세요 (기본버전)</button>
    <button @click="increaseCount()">클릭하세요 (축약버전)</button>

    <p>카운트 : {{this.count}}</p>
    <script>
      const { createApp } = Vue;

      createApp({
        data() {
          return {
            count: 0,
          };
        },
        methods: {
          increaseCount() {
            this.count++;
          },
        },
      }).mount('#app');
    </script>
  </body>
</html>
